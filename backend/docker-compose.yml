version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - AURA_DATABASE_URL=${AURA_DATABASE_URL:-postgresql://neondb_owner:npg_9UTkRcY7eKCv@ep-spring-waterfall-ao2i7w2l.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - redis
    restart: always

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - AURA_DATABASE_URL=${AURA_DATABASE_URL:-postgresql://neondb_owner:npg_9UTkRcY7eKCv@ep-spring-waterfall-ao2i7w2l.c-2.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - redis
      - api
    restart: always
