[build]
builder = "nixpacks"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

[[services]]
name = "api"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
env = { AURA_ENVIRONMENT = "production", AURA_CORS_ORIGINS = "https://your-vercel-domain.vercel.app" }

[[services]]
name = "worker"
startCommand = "celery -A app.worker.celery_app worker --loglevel=info --concurrency=2"
env = { AURA_ENVIRONMENT = "production" }
